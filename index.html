<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Interactive Script Memorization Tool</title>
  <!-- Link to your external CSS -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Fixed header controls for language and theme -->
  <div class="header-controls">
    <select id="languageSelect">
      <option value="en">🇬🇧 English</option>
      <option value="it">🇮🇹 Italiano</option>
    </select>
    <button id="themeToggle">🌓</button>
  </div>

  <!-- Main container for the app -->
  <div id="app"></div>

  <!-- Spinner and toast notification elements -->
  <div class="spinner"></div>
  <div class="toast"></div>

  <!-- Load scripts in correct order, without type="module" -->
  <script src="js/utils.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
