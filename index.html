<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A tool to help actors memorize their lines">
  <title>Script Memorization Tool</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
  <!-- Header with language and theme toggles -->
  <div class="app-header">
    <div class="header-controls">
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="it">Italiano</option>
      </select>
      <button id="themeToggle">🌓</button>
      <button id="optionsToggle">⚙️</button>
      <div id="optionsMenu" style="display: none;">
        <ul>
          <li id="optionAdvanced">
            <label>
              <input type="checkbox" id="advancedModeToggle">
              Advanced Mode
            </label>
          </li>
          <li id="optionConverter">Script Converter</li>
          <li id="optionAbout">About</li>
          <li id="optionHelp">Help</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Main container for the app -->
  <div id="app"></div>

  <!-- Spinner and toast notification elements -->
  <div class="spinner"></div>
  <div class="toast"></div>

  <!-- Load main script as module -->
  <script type="module" src="js/core/app.js"></script>
</body>
</html>
