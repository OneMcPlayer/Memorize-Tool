<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Interactive Script Memorization Tool</title>
  <!-- Add base URL for GitHub Pages -->
  <base href="/Memorize-Tool/">
  <!-- Link to your external CSS -->
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
  <!-- Fixed header controls for language and theme -->
  <div class="header-controls">
    <select id="languageSelect">
      <option value="en">🇬🇧 English</option>
      <option value="it">🇮🇹 Italiano</option>
    </select>
    <div class="header-right">
      <button id="themeToggle">🌓</button>
      <button id="optionsToggle">⋮</button>
      <div id="optionsMenu" class="hidden">
        <ul>
          <li id="optionAbout">About</li>
          <li id="optionHelp">Help</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Main container for the app -->
  <div id="app"></div>

  <!-- Spinner and toast notification elements -->
  <div class="spinner"></div>
  <div class="toast"></div>

  <!-- Load main script as module -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
