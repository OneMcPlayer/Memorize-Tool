<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Script Memorization Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .login-options {
            margin-top: 30px;
        }

        .login-option {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .login-option:hover {
            background: #e9ecef;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }

        .login-option img {
            width: 30px;
            height: 30px;
            margin-right: 15px;
        }

        .login-option-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .login-option-description {
            font-size: 0.9em;
            color: #6c757d;
        }

        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

        .info {
            background: #cce5ff;
            color: #004085;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8em;
            color: #6c757d;
        }

        .skip-login {
            margin-top: 20px;
        }

        .skip-login a {
            color: #3498db;
            text-decoration: none;
        }

        .skip-login a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Script Memorization Tool</h1>
        <p>Please log in to continue or skip to use as guest</p>

        <div class="login-options">
            <div class="login-option" id="passkey-login">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJjdXJyZW50Q29sb3IiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIiBjbGFzcz0ibHVjaWRlIGx1Y2lkZS1rZXkiPjxjaXJjbGUgY3g9IjgiIGN5PSIxNSIgcj0iMyIvPjxwYXRoIGQ9Ik0xMC44NSAxMi4xNSBMMTIgMTFsNCA0IDQtNC0xLjE1LTEuMTUiLz48cGF0aCBkPSJNOCA4VjZhNCA0IDAgMCAxIDQtNGgwYTQgNCAwIDAgMSA0IDR2Mk01IDEwaDQiLz48cGF0aCBkPSJNNiA4aDJ2PTIiLz48L3N2Zz4=" alt="Passkey Icon">
                <div>
                    <div class="login-option-title">Login with Passkey</div>
                    <div class="login-option-description">Use 1Password or your device's passkey to securely log in without a password</div>
                </div>
            </div>
        </div>

        <div id="register-form" class="hidden" style="margin-top: 20px;">
            <div style="text-align: left; margin-bottom: 10px;">
                <label for="username" style="display: block; margin-bottom: 5px; font-weight: bold;">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required style="width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 4px;">
            </div>
            <div style="display: flex; justify-content: space-between;">
                <button id="register-button" style="background: #3498db; color: white; border: none; border-radius: 4px; padding: 8px 16px; cursor: pointer;">Register Passkey</button>
                <button id="cancel-register" style="background: #e74c3c; color: white; border: none; border-radius: 4px; padding: 8px 16px; cursor: pointer;">Cancel</button>
            </div>
        </div>

        <div class="register-option" style="margin-top: 20px; font-size: 0.9em;">
            <p>Don't have a passkey? <a id="show-register" style="color: #3498db; text-decoration: none; cursor: pointer;">Register a new passkey</a></p>
        </div>

        <div class="skip-login">
            <a href="/" id="skip-login-link">Skip login and continue as guest</a>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script>
        // Check if WebAuthn is supported
        const isWebAuthnSupported = () => {
            return window.PublicKeyCredential &&
                   typeof window.PublicKeyCredential === 'function' &&
                   typeof window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable === 'function';
        };

        // Check if we're running on localhost
        const isLocalhost = () => {
            return window.location.hostname === 'localhost' ||
                   window.location.hostname === '127.0.0.1' ||
                   window.location.hostname.startsWith('192.168.');
        };

        // Function to convert base64 to ArrayBuffer
        function base64ToArrayBuffer(base64) {
            const binaryString = window.atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // Function to convert ArrayBuffer to base64
        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }

        // Register a new passkey
        async function registerPasskey(username) {
            try {
                // Generate a random user ID
                const userId = new Uint8Array(16);
                window.crypto.getRandomValues(userId);

                // Create the PublicKeyCredentialCreationOptions
                const publicKeyCredentialCreationOptions = {
                    challenge: new Uint8Array(32),
                    rp: {
                        name: "Memorize Tool",
                        id: "localhost"
                    },
                    user: {
                        id: userId,
                        name: username,
                        displayName: username
                    },
                    pubKeyCredParams: [
                        { type: "public-key", alg: -7 }, // ES256
                        { type: "public-key", alg: -257 } // RS256
                    ],
                    authenticatorSelection: {
                        authenticatorAttachment: "platform",
                        requireResidentKey: true,
                        userVerification: "required"
                    },
                    timeout: 60000,
                    attestation: "none"
                };

                // Fill challenge with random values
                window.crypto.getRandomValues(publicKeyCredentialCreationOptions.challenge);

                // Create the credential
                const credential = await navigator.credentials.create({
                    publicKey: publicKeyCredentialCreationOptions
                });

                // Convert the credential to a format that can be sent to the server
                const credentialId = arrayBufferToBase64(credential.rawId);
                const clientDataJSON = arrayBufferToBase64(credential.response.clientDataJSON);
                const attestationObject = arrayBufferToBase64(credential.response.attestationObject);

                // Send the credential to the server
                const response = await fetch('/api/passkey/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username,
                        credential: {
                            id: credentialId,
                            clientDataJSON,
                            attestationObject,
                            type: credential.type
                        }
                    })
                });

                // Check if the response is OK (status in the range 200-299)
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Server error:', response.status, errorText);
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    // Registration successful, now authenticate
                    await authenticateWithPasskey();
                } else {
                    throw new Error(data.error || 'Registration failed');
                }
            } catch (error) {
                console.error('Error registering passkey:', error);
                throw error;
            }
        }

        // Authenticate with a passkey
        async function authenticateWithPasskey() {
            try {
                // Create the PublicKeyCredentialRequestOptions
                const publicKeyCredentialRequestOptions = {
                    challenge: new Uint8Array(32),
                    rpId: "localhost",
                    userVerification: "required",
                    timeout: 60000
                };

                // Fill challenge with random values
                window.crypto.getRandomValues(publicKeyCredentialRequestOptions.challenge);

                // Get the credential
                const credential = await navigator.credentials.get({
                    publicKey: publicKeyCredentialRequestOptions
                });

                // Convert the credential to a format that can be sent to the server
                const credentialId = arrayBufferToBase64(credential.rawId);
                const clientDataJSON = arrayBufferToBase64(credential.response.clientDataJSON);
                const authenticatorData = arrayBufferToBase64(credential.response.authenticatorData);
                const signature = arrayBufferToBase64(credential.response.signature);

                // Send the credential to the server
                const response = await fetch('/api/passkey/authenticate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        credential: {
                            id: credentialId,
                            clientDataJSON,
                            authenticatorData,
                            signature,
                            type: credential.type
                        }
                    })
                });

                // Check if the response is OK (status in the range 200-299)
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Server error:', response.status, errorText);
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    // Store the token in localStorage
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('authTokenExpiry', data.expiresAt);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Redirect to the main page
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirectUrl = urlParams.get('rd') || '/';
                    window.location.href = redirectUrl;
                } else {
                    throw new Error(data.error || 'Authentication failed');
                }
            } catch (error) {
                console.error('Error authenticating with passkey:', error);
                throw error;
            }
        }

        // Show status message
        function showStatus(message, type) {
            const statusElement = document.getElementById('status');
            statusElement.textContent = message;
            statusElement.className = `status ${type}`;
            statusElement.style.display = 'block';
        }

        // Check if WebAuthn is supported
        if (!isWebAuthnSupported()) {
            showStatus('Your browser does not support passkeys. Please use a modern browser like Chrome, Firefox, Safari, or Edge.', 'error');
            document.getElementById('passkey-login').style.opacity = '0.5';
            document.getElementById('passkey-login').style.cursor = 'not-allowed';
        }

        // Handle passkey login
        document.getElementById('passkey-login').addEventListener('click', async function() {
            if (!isWebAuthnSupported()) {
                showStatus('Your browser does not support passkeys. Please use a modern browser.', 'error');
                return;
            }

            if (!isLocalhost()) {
                showStatus('Passkey authentication only works on localhost. Your current hostname is: ' + window.location.hostname, 'error');
                return;
            }

            try {
                showStatus('Authenticating with passkey...', 'info');
                await authenticateWithPasskey();
            } catch (error) {
                if (error.name === 'NotFoundError') {
                    showStatus('No passkey found. Please register a passkey first.', 'error');
                } else {
                    showStatus(`Authentication failed: ${error.message}`, 'error');
                }
            }
        });

        // Show registration form
        document.getElementById('show-register').addEventListener('click', function() {
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('show-register').parentElement.parentElement.classList.add('hidden');
        });

        // Cancel registration
        document.getElementById('cancel-register').addEventListener('click', function() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('show-register').parentElement.parentElement.classList.remove('hidden');
            document.getElementById('username').value = '';
        });

        // Handle passkey registration
        document.getElementById('register-button').addEventListener('click', async function() {
            const username = document.getElementById('username').value.trim();

            if (!username) {
                showStatus('Please enter a username', 'error');
                return;
            }

            if (!isWebAuthnSupported()) {
                showStatus('Your browser does not support passkeys. Please use a modern browser.', 'error');
                return;
            }

            if (!isLocalhost()) {
                showStatus('Passkey registration only works on localhost. Your current hostname is: ' + window.location.hostname, 'error');
                return;
            }

            try {
                showStatus('Registering passkey...', 'info');
                await registerPasskey(username);
                showStatus('Passkey registered successfully! Logging in...', 'success');
            } catch (error) {
                showStatus(`Registration failed: ${error.message}`, 'error');
            }
        });

        // Skip login and continue as guest
        document.getElementById('skip-login-link').addEventListener('click', function(e) {
            e.preventDefault();
            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('rd') || '/';
            window.location.href = redirectUrl;
        });
    </script>
</body>
</html>
