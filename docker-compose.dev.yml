version: '3'

services:
  # React frontend with hot-reloading
  frontend:
    image: node:18-alpine
    container_name: frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm start"
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
    networks:
      - app-network

  # Node.js backend with nodemon for auto-restart
  server:
    image: node:18-alpine
    container_name: server-dev
    working_dir: /app
    command: sh -c "npm install && npx nodemon --watch . index.js"
    volumes:
      - ./server:/app
      - ./auth/server:/app/auth/server
      - ./auth/db:/app/auth/db
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
    networks:
      - app-network

  # Nginx for development - routes traffic to React dev server
  nginx:
    image: nginx:alpine
    container_name: nginx-dev
    restart: unless-stopped
    ports:
      - "80:80"      # Standard HTTP port
    volumes:
      - ./test-nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./auth/nginx/conf.d:/etc/nginx/conf.d
      - ./auth/nginx/snippets:/etc/nginx/snippets
      - ./public:/usr/share/nginx/html
    depends_on:
      - frontend
      - server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
