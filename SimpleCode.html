<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Custom Memorization App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #f0f0f0;
    }
    
    #app {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-bottom: 10px;
      padding: 10px;
      box-sizing: border-box;
      font-size: 1em;
    }

    button {
      padding: 10px 15px;
      font-size: 1em;
      cursor: pointer;
      margin: 5px 5px 15px 0;
    }

    .hidden {
      display: none;
    }

    .question-area {
      margin-top: 20px;
    }

    .question {
      padding: 10px 0;
      font-size: 1.1em;
      font-weight: bold;
    }

    #answerInput {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      box-sizing: border-box;
      font-size: 1em;
    }

    .result {
      margin-top: 10px;
      font-weight: bold;
    }

    .correct {
      color: green;
    }

    .incorrect {
      color: red;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>Custom Memorization App</h1>

    <!-- 1. Input for user’s text -->
    <label for="userText">Enter the text you want to memorize:</label>
    <textarea id="userText" placeholder="Type or paste your text here..."></textarea>
    <br />
    <button id="createQuestionBtn">Create a Question</button>

    <!-- 2. Question/Answer Area: initially hidden until the user creates a question -->
    <div id="questionArea" class="question-area hidden">
      <p class="question" id="questionText"></p>
      
      <label for="answerInput">What word is missing?</label>
      <input type="text" id="answerInput" placeholder="Type the missing word..." />
      
      <button id="checkBtn">Check</button>
      <button id="nextBlankBtn">Try Another Blank</button>

      <div class="result" id="resultMessage"></div>
    </div>
  </div>

  <script>
    // References to elements
    const createQuestionBtn = document.getElementById("createQuestionBtn");
    const userTextArea = document.getElementById("userText");
    const questionArea = document.getElementById("questionArea");
    const questionText = document.getElementById("questionText");
    const answerInput = document.getElementById("answerInput");
    const checkBtn = document.getElementById("checkBtn");
    const nextBlankBtn = document.getElementById("nextBlankBtn");
    const resultMessage = document.getElementById("resultMessage");

    // Data needed for each round
    let originalWords = [];       // Holds all the words from user's text
    let missingWord = "";         // The actual missing word for the current question
    let blankIndex = -1;          // Index of the missing word in the original text

    // 1. When user clicks 'Create a Question', parse text and create a blank
    createQuestionBtn.addEventListener("click", () => {
      // Get the user's text
      const userText = userTextArea.value.trim();
      if (!userText) {
        alert("Please enter some text to memorize!");
        return;
      }

      // Split the text into words
      // \s+ is a simple way to split on spaces, tabs, or new lines
      originalWords = userText.split(/\s+/);

      // If there's only one word or the user typed nonsense, handle that
      if (originalWords.length < 2) {
        alert("Please enter a longer text (at least two words).");
        return;
      }

      // Remove any leftover result message
      resultMessage.textContent = "";

      // Show the question area
      questionArea.classList.remove("hidden");

      // Create the initial question (blank)
      createBlank();
    });

    // 2. Function to pick a random word and create a blank in the question
    function createBlank() {
      // Pick a random index for the missing word
      blankIndex = Math.floor(Math.random() * originalWords.length);
      missingWord = originalWords[blankIndex];

      // Make a copy of the words and replace the chosen word with a placeholder (___)
      const displayedWords = [...originalWords];
      displayedWords[blankIndex] = "___";

      // Display the new "question" (text with one blank)
      questionText.textContent = displayedWords.join(" ");

      // Clear any old answer or result
      answerInput.value = "";
      resultMessage.textContent = "";
      resultMessage.className = "result";
    }

    // 3. Check if the user's input is correct
    checkBtn.addEventListener("click", () => {
      const userAnswer = answerInput.value.trim();
      if (!userAnswer) {
        alert("Please type a guess before checking!");
        return;
      }

      // Compare case-insensitively
      if (userAnswer.toLowerCase() === missingWord.toLowerCase()) {
        resultMessage.textContent = "Correct!";
        resultMessage.classList.add("correct");
        resultMessage.classList.remove("incorrect");
      } else {
        resultMessage.textContent = `Incorrect! The missing word was "${missingWord}".`;
        resultMessage.classList.add("incorrect");
        resultMessage.classList.remove("correct");
      }
    });

    // 4. "Try Another Blank" button picks a new random word from the same text
    nextBlankBtn.addEventListener("click", () => {
      createBlank();
    });
  </script>
</body>
</html>
