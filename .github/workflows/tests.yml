name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        # Remove cache-dependency-path to avoid dependency on the lock file
        cache: 'npm'
    
    - name: Check for package-lock.json
      id: check-lock-file
      run: |
        if [ -f "package-lock.json" ]; then
          echo "lock_file_exists=true" >> $GITHUB_OUTPUT
        else
          echo "lock_file_exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Generate package-lock.json
      if: steps.check-lock-file.outputs.lock_file_exists != 'true'
      run: npm install --package-lock-only
    
    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

  cypress:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        
    - name: Check for package-lock.json
      id: check-lock-file
      run: |
        if [ -f "package-lock.json" ]; then
          echo "lock_file_exists=true" >> $GITHUB_OUTPUT
        else
          echo "lock_file_exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Generate package-lock.json
      if: steps.check-lock-file.outputs.lock_file_exists != 'true'
      run: npm install --package-lock-only
      
    - name: Install dependencies
      run: npm ci
      
    - name: Create cypress directory structure
      run: |
        mkdir -p cypress/screenshots
        mkdir -p cypress/videos
      
    - name: Start HTTP server
      run: npx http-server . -p 8080 &
      
    - name: Wait for server
      run: npx wait-on http://localhost:8080
      
    - name: Run Cypress tests
      uses: cypress-io/github-action@v6
      with:
        browser: chrome
        headless: true
        
    - name: Upload screenshots on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: cypress-screenshots
        path: cypress/screenshots
        if-no-files-found: ignore
