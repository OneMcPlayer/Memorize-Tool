name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        # Disable npm cache completely
        cache: false
    
    - name: Install dependencies
      run: npm install
      
    - name: Run tests
      run: npm test

  cypress:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        # Disable npm cache completely
        cache: false
        
    - name: Install dependencies
      run: npm install
      
    # Install Cypress separately to ensure it's properly installed
    - name: Install Cypress
      run: npm install cypress --no-save
      
    - name: Verify Cypress
      run: npx cypress verify
      
    - name: Create cypress directory structure
      run: |
        mkdir -p cypress/screenshots
        mkdir -p cypress/videos
      
    - name: Start HTTP server
      run: npx http-server . -p 8080 &
      
    - name: Wait for server
      run: npx wait-on http://localhost:8080 --timeout 60000
      
    - name: Run Cypress tests
      uses: cypress-io/github-action@v6
      with:
        browser: chrome
        headless: true
        install: false
        wait-on: 'http://localhost:8080'
        wait-on-timeout: 120
        
    - name: Upload screenshots on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: cypress-screenshots
        path: cypress/screenshots
        if-no-files-found: ignore
        
    - name: Upload videos
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cypress-videos
        path: cypress/videos
        if-no-files-found: ignore
