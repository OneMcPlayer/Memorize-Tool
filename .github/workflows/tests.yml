name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

  cypress:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install dependencies
      run: npm install

    # Install Cypress separately to ensure it's properly installed
    - name: Install Cypress
      run: npm install cypress --no-save

    - name: Verify Cypress
      run: npx cypress verify

    - name: Create cypress directory structure
      run: |
        mkdir -p cypress/screenshots
        mkdir -p cypress/videos

    # Start React app and run Cypress tests
    - name: Start React app and run Cypress tests
      run: |
        echo "Starting React app"
        npm start &
        SERVER_PID=$!
        echo "Server started with PID: $SERVER_PID"

        # Give the server a moment to start
        sleep 20

        # Check if server is running
        if ps -p $SERVER_PID > /dev/null; then
          echo "Server is running with PID: $SERVER_PID"
        else
          echo "Server failed to start"
          exit 1
        fi

        # Check if server is accessible
        curl -v http://localhost:3000 || echo "Cannot connect to server with curl"

        # Run Cypress tests directly
        npx cypress run --browser chrome --headless

        # Store the exit code
        CYPRESS_EXIT_CODE=$?

        # Kill the server
        kill $SERVER_PID || true

        # Exit with Cypress exit code
        exit $CYPRESS_EXIT_CODE

    - name: Upload screenshots on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: cypress-screenshots
        path: cypress/screenshots
        if-no-files-found: ignore

    - name: Upload videos
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cypress-videos
        path: cypress/videos
        if-no-files-found: ignore
