name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install dependencies
      run: npm install
      
    - name: Run tests
      run: npm test

  cypress:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        
    - name: Install dependencies
      run: npm install
      
    # Install Cypress separately to ensure it's properly installed
    - name: Install Cypress
      run: npm install cypress --no-save
      
    - name: Verify Cypress
      run: npx cypress verify
      
    - name: Create cypress directory structure
      run: |
        mkdir -p cypress/screenshots
        mkdir -p cypress/videos
      
    # Debug server availability
    - name: Check directory contents
      run: ls -la
      
    # Use npm script to start the server instead of direct http-server command
    - name: Start HTTP server
      run: npm run serve &
      
    # Add debug info to help diagnose server issues
    - name: Debug server
      run: |
        sleep 5
        echo "Checking if server is running:"
        ps aux | grep http-server
        echo "Checking network connections:"
        netstat -tulpn | grep 8080 || echo "No process found on port 8080"
        curl -v http://localhost:8080 || echo "Cannot connect to server"
      
    - name: Wait for server
      run: npx wait-on http://localhost:8080 --timeout 120000
      
    - name: Run Cypress tests
      uses: cypress-io/github-action@v6
      with:
        browser: chrome
        headless: true
        install: false
        wait-on: 'http://localhost:8080'
        wait-on-timeout: 120
        
    - name: Upload screenshots on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: cypress-screenshots
        path: cypress/screenshots
        if-no-files-found: ignore
        
    - name: Upload videos
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cypress-videos
        path: cypress/videos
        if-no-files-found: ignore
